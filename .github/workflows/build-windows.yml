name: "Build Windows x64"

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Install frontend dependencies
        run: bun install

      - name: Disable code signing
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            delete conf.bundle.windows.signCommand;
            conf.plugins.updater.pubkey = 'dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXk6IDMxRUFFMDM2OUMwQzAzRjcKUldUM0F3eWNOdURxTVlRd0s1N3BxQWpjVE9EUkxaZTRDdHZMREdvTUs5Wk56TWZCOS96d1pBRzYK';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2));
          "

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: parler-windows-x64-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload NSIS exe
        uses: actions/upload-artifact@v4
        with:
          name: parler-windows-x64-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
